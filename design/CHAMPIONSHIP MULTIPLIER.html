<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Championship Multiplier Redesign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Exo+2:wght@900&family=Syncopate:wght@700&display=swap');

        body {
            background-color: #030303;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Oswald', sans-serif;
            perspective: 1500px;
            overflow: hidden;
        }

        /* The Main Cabinet Frame Context */
        .cabinet-context {
            position: relative;
            width: 1000px;
            height: 600px;
            background: 
                radial-gradient(circle at 50% 50%, rgba(255, 0, 0, 0.15) 0%, transparent 80%),
                #080808;
            border: 1px solid #222;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 200px #000;
        }

        /* 3D Wrapper with a floating animation */
        .banner-3d-wrapper {
            transform: rotateX(12deg) rotateY(-5deg);
            position: relative;
            animation: float-3d 6s infinite alternate ease-in-out;
        }

        /* Outer Frame - Heavy Machined Metal */
        .banner-container {
            position: relative;
            width: 700px;
            height: 300px;
            background: linear-gradient(135deg, #4d4d4d 0%, #1a1a1a 40%, #0a0a0a 60%, #333 100%);
            padding: 3px;
            clip-path: polygon(8% 0, 92% 0, 100% 15%, 100% 85%, 92% 100%, 8% 100%, 0 85%, 0 15%);
            box-shadow: 
                0 50px 80px rgba(0,0,0,1),
                0 0 30px rgba(255, 0, 0, 0.2);
        }

        /* The Animated Red Glow Gasket - Intense */
        .glow-gasket {
            position: absolute;
            inset: 8px;
            background: linear-gradient(90deg, #660000, #ff0000, #660000);
            clip-path: polygon(8% 0, 92% 0, 100% 15%, 100% 85%, 92% 100%, 8% 100%, 0 85%, 0 15%);
            filter: blur(5px);
            opacity: 0.9;
            animation: pulse-glow 2s infinite alternate ease-in-out;
        }

        /* Main Plate Surface */
        .banner-inner {
            position: relative;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at center, rgba(30,30,30,0.5) 0%, rgba(0,0,0,0.95) 100%),
                #121212;
            clip-path: polygon(8% 0, 92% 0, 100% 15%, 100% 85%, 92% 100%, 8% 100%, 0 85%, 0 15%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* Particle Background Effect */
        .energy-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 10% 10%, #fff, transparent),
                radial-gradient(1px 1px at 90% 90%, #f00, transparent),
                radial-gradient(2px 2px at 50% 50%, #f00, transparent),
                radial-gradient(1px 1px at 20% 80%, #fff, transparent);
            background-size: 150px 150px;
            opacity: 0.2;
            animation: move-bg 10s infinite linear;
        }

        /* High Gloss Reflection */
        .gloss-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(125deg, 
                rgba(255,255,255,0.1) 0%, 
                rgba(255,255,255,0.05) 10%, 
                transparent 15%, 
                transparent 45%, 
                rgba(255,255,255,0.1) 50%, 
                transparent 55%);
            pointer-events: none;
            z-index: 5;
        }

        /* Upgraded Cyber Brackets */
        .clamp {
            position: absolute;
            width: 80px;
            height: 35px;
            background: linear-gradient(to bottom, #777, #333 40%, #111);
            z-index: 30;
            border: 1px solid #999;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .clamp::before {
            content: '';
            width: 70%;
            height: 3px;
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        .clamp-tl { top: -12px; left: 30px; transform: skewX(-25deg); }
        .clamp-tr { top: -12px; right: 30px; transform: skewX(25deg); }
        .clamp-bl { bottom: -12px; left: 30px; transform: skewX(25deg); }
        .clamp-br { bottom: -12px; right: 30px; transform: skewX(-25deg); }

        /* Typography Enhancements */
        .subtitle {
            font-family: 'Syncopate', sans-serif;
            font-size: 10px;
            color: #ff3333;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(255,0,0,1);
            background: linear-gradient(90deg, transparent, #ff0000, transparent);
            -webkit-background-clip: text;
            padding: 0 20px;
        }

        .title {
            font-size: 52px;
            font-weight: 900;
            line-height: 0.85;
            text-transform: uppercase;
            text-align: center;
            background: linear-gradient(180deg, #fff 10%, #ccc 40%, #888 50%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 6px 4px rgba(0,0,0,1));
            letter-spacing: 2px;
            z-index: 10;
        }

        .multiplier-container {
            position: relative;
            margin-top: 15px;
            z-index: 10;
        }

        .multiplier {
            font-family: 'Exo 2', sans-serif;
            font-size: 115px;
            font-weight: 900;
            background: linear-gradient(180deg, 
                #fffbe0 0%, 
                #ffd700 35%, 
                #8a6d3b 45%, 
                #ffd700 55%, 
                #cc9900 70%, 
                #4d3d00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.9)) drop-shadow(0 0 30px rgba(255,200,0,0.3));
            display: flex;
            align-items: center;
            line-height: 1;
        }

        .multiplier span.x {
            font-size: 55px;
            margin-right: -2px;
            background: #fff;
            -webkit-background-clip: text;
            opacity: 0.9;
        }

        .bottom-ui {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        .range-pill {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 0, 0, 0.4);
            color: #ff5555;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 14px;
            padding: 4px 25px;
            border-radius: 4px;
            letter-spacing: 3px;
            box-shadow: 0 0 15px rgba(255,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .range-pill::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: scanner 2s infinite;
        }

        /* Animations */
        @keyframes float-3d {
            from { transform: rotateX(12deg) rotateY(-5deg) translateY(0); }
            to { transform: rotateX(15deg) rotateY(-2deg) translateY(-10px); }
        }

        @keyframes move-bg {
            from { background-position: 0 0; }
            to { background-position: 150px 300px; }
        }

        @keyframes sweep {
            0% { transform: translateX(-150%) skewX(-45deg); }
            100% { transform: translateX(150%) skewX(-45deg); }
        }

        @keyframes scanner {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes pulse-glow {
            from { opacity: 0.6; filter: blur(4px); box-shadow: 0 0 10px #ff0000; }
            to { opacity: 1; filter: blur(8px); box-shadow: 0 0 40px #ff0000; }
        }

        /* Technical Corner Accents */
        .corner-accent {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid #ff0000;
            z-index: 10;
        }
        .ca-tl { top: 20px; left: 60px; border-right: 0; border-bottom: 0; }
        .ca-tr { top: 20px; right: 60px; border-left: 0; border-bottom: 0; }
        .ca-bl { bottom: 20px; left: 60px; border-right: 0; border-top: 0; }
        .ca-br { bottom: 20px; right: 60px; border-left: 0; border-top: 0; }

    </style>
</head>
<body>

    <div class="cabinet-context">
        
        <div class="banner-3d-wrapper">
            
            <!-- Heavy Cyber Clamps -->
            <div class="clamp clamp-tl"></div>
            <div class="clamp clamp-tr"></div>
            <div class="clamp clamp-bl"></div>
            <div class="clamp clamp-br"></div>

            <div class="banner-container">
                <!-- Glowing Energy Underlayer -->
                <div class="glow-gasket"></div>
                
                <div class="banner-inner">
                    <div class="energy-particles"></div>
                    <div class="gloss-overlay"></div>
                    
                    <!-- HUD Accents -->
                    <div class="corner-accent ca-tl"></div>
                    <div class="corner-accent ca-tr"></div>
                    <div class="corner-accent ca-bl"></div>
                    <div class="corner-accent ca-br"></div>
                    
                    <div class="subtitle">CHAMPIONSHIP SECURED</div>
                    
                    <div class="title">
                        VICTORY<br>MULTIPLIER
                    </div>

                    <div class="multiplier-container">
                        <div class="multiplier">
                            <span class="x">×</span>1
                        </div>
                    </div>

                    <div class="bottom-ui">
                        <svg width="60" height="10" viewBox="0 0 60 10">
                            <line x1="0" y1="5" x2="60" y2="5" stroke="#ff0000" stroke-width="1" stroke-dasharray="4 2" />
                        </svg>
                        <div class="range-pill">1.00 — 1.00</div>
                        <svg width="60" height="10" viewBox="0 0 60 10">
                            <line x1="0" y1="5" x2="60" y2="5" stroke="#ff0000" stroke-width="1" stroke-dasharray="4 2" />
                        </svg>
                    </div>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
