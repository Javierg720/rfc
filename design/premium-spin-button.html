<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Spin Button</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #0a0a0a;
      display: flex;
      gap: 40px;
      align-items: center;
      font-family: system-ui;
    }

    /* PREMIUM SPIN BUTTON */
    .premium-spin-btn {
      --size: 96px;
      --red: #ff1744;
      --dark-red: #c41339;
      --black: #0a0a0a;
      --gray: #1a1a1a;

      position: relative;
      width: var(--size);
      height: var(--size);
      border: none;
      background: none;
      cursor: pointer;
      padding: 0;
      overflow: visible;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .premium-spin-btn:hover {
      transform: scale(1.12);
    }

    .premium-spin-btn:active {
      transform: scale(0.92);
    }

    /* Outer decorative halo */
    .premium-spin-btn__halo {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 23, 68, 0.5), transparent 70%);
      filter: blur(12px);
      z-index: 0;
    }

    /* Main button surface */
    .premium-spin-btn__surface {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, #ff5577, #ff1744 40%, #8b0023 100%),
        repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0, 0, 0, 0.2) 2px, rgba(0, 0, 0, 0.2) 4px);
      box-shadow:
        inset 0 2px 12px rgba(255, 23, 68, 0.5),
        inset 0 -4px 16px rgba(0, 0, 0, 0.95),
        0 0 25px rgba(255, 23, 68, 0.8),
        0 15px 40px rgba(0, 0, 0, 0.98);
      z-index: 2;
    }

    /* Outer luxury ring */
    .premium-spin-btn__ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 4px solid;
      border-image: linear-gradient(135deg, #1a1a1a 0%, #000 25%, #1a1a1a 50%, #000 75%, #1a1a1a 100%) 1;
      box-shadow: 0 0 16px rgba(255, 23, 68, 0.7), inset 0 0 8px rgba(255, 23, 68, 0.3);
      z-index: 3;
    }

    /* Double inner ring */
    .premium-spin-btn__ring-inner {
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 2px solid;
      border-image: linear-gradient(45deg, #ff1744, #ff5577, #ff1744) 1;
      z-index: 3;
    }

    /* Rotating pattern overlay */
    .premium-spin-btn__pattern {
      position: absolute;
      inset: 8%;
      border-radius: 50%;
      background:
        conic-gradient(from 0deg, transparent 0deg 30deg, rgba(255, 23, 68, 0.15) 30deg 60deg, transparent 60deg),
        radial-gradient(circle, transparent 30%, rgba(0, 0, 0, 0.1) 100%);
      z-index: 2;
      animation: rotate 20s linear infinite;
    }

    /* Center gem */
    .premium-spin-btn__center {
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #ff5577, #ff1744, #8b0023),
        radial-gradient(circle at 35% 35%, rgba(255, 23, 68, 0.4), transparent);
      box-shadow:
        inset 0 1px 4px rgba(255, 100, 130, 0.4),
        inset 0 -1px 4px rgba(0, 0, 0, 0.95),
        0 0 16px rgba(255, 23, 68, 0.9);
      z-index: 4;
    }

    /* Text container */
    .premium-spin-btn__text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      perspective: 1000px;
    }

    .premium-spin-btn__label {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: calc(var(--size) * 0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      text-shadow:
        0 0 12px rgba(255, 23, 68, 0.9),
        0 0 24px rgba(255, 23, 68, 0.7),
        0 3px 8px rgba(0, 0, 0, 0.95),
        inset 0 -1px 2px rgba(0, 0, 0, 0.6);
      font-style: italic;
      user-select: none;
      transition: all 0.3s ease;
    }

    .premium-spin-btn:hover .premium-spin-btn__label {
      text-shadow:
        0 0 18px rgba(255, 23, 68, 1),
        0 0 32px rgba(255, 23, 68, 0.9),
        0 3px 8px rgba(0, 0, 0, 0.95),
        inset 0 -1px 2px rgba(0, 0, 0, 0.6);
      color: #fff;
      letter-spacing: 0.12em;
    }

    /* Corner accents (fancy jewel flourishes) */
    .premium-spin-btn__accent {
      position: absolute;
      z-index: 5;
      background: radial-gradient(circle, #ff5577, #ff1744);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(255, 23, 68, 0.9), inset 0 -1px 3px rgba(0,0,0,0.6);
      animation: jewel-pulse 2s ease-in-out infinite;
      border: 1px solid rgba(0, 0, 0, 0.3);
    }

    .premium-spin-btn__accent-tl {
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
    }

    .premium-spin-btn__accent-tr {
      top: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      animation-delay: 0.3s;
    }

    .premium-spin-btn__accent-bl {
      bottom: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      animation-delay: 0.6s;
    }

    .premium-spin-btn__accent-br {
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      animation-delay: 0.9s;
    }

    /* Jewel pulsing animation */
    @keyframes jewel-pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 12px rgba(255, 23, 68, 0.9), inset 0 -1px 3px rgba(0,0,0,0.6);
      }
      50% {
        transform: scale(1.25);
        box-shadow: 0 0 20px rgba(255, 23, 68, 1), inset 0 -1px 3px rgba(0,0,0,0.6);
      }
    }

    /* Rotating pattern */
    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Pulse glow on active */
    @keyframes premium-pulse {
      0%, 100% {
        box-shadow:
          inset 0 2px 12px rgba(255, 23, 68, 0.5),
          inset 0 -4px 16px rgba(0, 0, 0, 0.95),
          0 0 25px rgba(255, 23, 68, 0.8),
          0 15px 40px rgba(0, 0, 0, 0.98);
      }
      50% {
        box-shadow:
          inset 0 2px 12px rgba(255, 23, 68, 0.8),
          inset 0 -4px 16px rgba(0, 0, 0, 0.95),
          0 0 45px rgba(255, 23, 68, 1),
          0 15px 40px rgba(0, 0, 0, 0.98);
      }
    }

    .premium-spin-btn.spinning .premium-spin-btn__surface {
      animation: premium-pulse 0.6s ease-in-out infinite;
    }

    /* Size variants */
    .premium-spin-btn--mobile {
      --size: 64px;
    }

    .premium-spin-btn--desktop {
      --size: 96px;
    }
  </style>
</head>
<body>
  <!-- Mobile size -->
  <div>
    <button class="premium-spin-btn premium-spin-btn--mobile" onclick="spinHandler(this)">
      <div class="premium-spin-btn__halo"></div>
      <div class="premium-spin-btn__surface"></div>
      <div class="premium-spin-btn__pattern"></div>
      <div class="premium-spin-btn__ring"></div>
      <div class="premium-spin-btn__ring-inner"></div>
      <div class="premium-spin-btn__center"></div>
    </button>
  </div>

  <!-- Desktop size -->
  <div>
    <button class="premium-spin-btn premium-spin-btn--desktop" onclick="spinHandler(this)">
      <div class="premium-spin-btn__halo"></div>
      <div class="premium-spin-btn__surface"></div>
      <div class="premium-spin-btn__pattern"></div>
      <div class="premium-spin-btn__ring"></div>
      <div class="premium-spin-btn__ring-inner"></div>
      <div class="premium-spin-btn__center"></div>
    </button>
  </div>

  <script>
    function spinHandler(button) {
      button.classList.add('spinning');
      setTimeout(() => button.classList.remove('spinning'), 600);
      console.log('Spin triggered');
    }
  </script>
</body>
</html>
